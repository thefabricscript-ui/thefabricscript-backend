name: Deploy — Staging

on:
  push:
    branches: [develop]

env:
  DOTNET_VERSION: '10.0.x'
  DOCKER_IMAGE: thefabricscript-api

jobs:
  deploy-staging:
    name: Build Docker & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish API
        run: >
          dotnet publish TheFabricScript.API/TheFabricScript.API.csproj
          --configuration Release
          --output ./publish

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/thefabricscript-ui/${{ env.DOCKER_IMAGE }}:staging
            ghcr.io/thefabricscript-ui/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Uncomment when cloud is set up:
